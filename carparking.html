<!DOCTYPE html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%230066cc'/><text y='.9em' font-size='85' font-family='Arial' font-weight='bold' fill='white' x='18'>P</text></svg>">

  <meta name="apple-mobile-web-app-title" content="停車場控制">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="application-name" content="停車場控制">
  <meta name="theme-color" content="#0066cc">

  <title>停車場遠端控制</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .section-title {
      font-size: 0.95rem;
      color: #666;
      margin-top: 28px;
      margin-bottom: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding-left: 8px;
    }

    .section-title:first-child {
      margin-top: 0;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 360px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 28px 32px;
    }

    .card h2 {
      font-size: 1.2rem;
      color: #444;
      margin-bottom: 20px;
      text-align: center;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 12px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 16px 0;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 1px;
    }

    .btn-open { background: #4CAF50; color: white; }
    .btn-open:hover { background: #43a047; transform: scale(1.03); }
    .btn-open:active { transform: scale(0.97); }

    .btn-close { background: #f44336; color: white; }
    .btn-close:hover { background: #e53935; transform: scale(1.03); }
    .btn-close:active { transform: scale(0.97); }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }

    .status.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .status.error   { background: #ffebee; color: #c62828; display: block; }
    .status.loading { background: #e3f2fd; color: #1565c0; display: block; }
  </style>
</head>
<body>

  <h1>🅿️ 停車場遠端控制</h1>

  <div class="cards">

    <!-- ===== 舊系統 ===== -->
    <div>
      <div class="section-title">📍 宏碁系統</div>
    </div>

    <!-- 太平路站 -->
    <div class="card">
      <h2>📍 太平路站</h2>
      <div class="btn-group">
        <button class="btn btn-open"  onclick="controlGate('open',  54, 'TOKEN_132', this)">🟢 開門</button>
        <button class="btn btn-close" onclick="controlGate('close', 54, 'TOKEN_132', this)">🔴 關門</button>
      </div>
      <div class="status" id="status-54"></div>
    </div>

    <!-- 三厝街站 -->
    <div class="card">
      <h2>📍 三厝街站</h2>
      <div class="btn-group">
        <button class="btn btn-open"  onclick="controlGate('open',  71, 'TOKEN_132', this)">🟢 開門</button>
        <button class="btn btn-close" onclick="controlGate('close', 71, 'TOKEN_132', this)">🔴 關門</button>
      </div>
      <div class="status" id="status-71"></div>
    </div>

    <!-- 東英路站 -->
    <div class="card">
      <h2>📍 東英路站</h2>
      <div class="btn-group">
        <button class="btn btn-open"  onclick="controlGate('open',  157, 'TOKEN_238', this)">🟢 開門</button>
        <button class="btn btn-close" onclick="controlGate('close', 157, 'TOKEN_238', this)">🔴 關門</button>
      </div>
      <div class="status" id="status-157"></div>
    </div>

    <!-- 中華路站 -->
    <div class="card">
      <h2>📍 中華路站</h2>
      <div class="btn-group">
        <button class="btn btn-open"  onclick="controlGate('open',  168, 'TOKEN_260', this)">🟢 開門</button>
        <button class="btn btn-close" onclick="controlGate('close', 168, 'TOKEN_260', this)">🔴 關門</button>
      </div>
      <div class="status" id="status-168"></div>
    </div>

    <!-- 永春東七路站 -->
    <div class="card">
      <h2>📍 永春東七路站</h2>
      <div class="btn-group">
        <h4>入口</h4>
        <button class="btn btn-open"  onclick="controlGate('open',  228, 'TOKEN_260', this)">🟢 開門</button>
        <button class="btn btn-close" onclick="controlGate('close', 228, 'TOKEN_260', this)">🔴 關門</button>
      </div>
      <div class="status" id="status-228"></div>
    </div>

    <!-- 豐樂公園站 -->
    <div class="card">
      <h2>📍 豐樂公園站</h2>
      <div class="btn-group">
        <button class="btn btn-open"  onclick="controlGate('open',  269, 'TOKEN_260', this)">🟢 開門</button>
        <button class="btn btn-close" onclick="controlGate('close', 269, 'TOKEN_260', this)">🔴 關門</button>
      </div>
      <div class="status" id="status-269"></div>
    </div>

    <!-- ===== woparker 新系統 ===== -->
    <div>
      <div class="section-title">woparker 系統</div>
    </div>

    <!-- 民生北路 A站 -->
    <div class="card">
      <h2>📍 民生北路 A站</h2>
      <div class="btn-group">
        <button class="btn btn-open"  onclick="woparkerControl('open', 1729, this)">🟢 開門</button>
        <button class="btn btn-close" onclick="woparkerControl('close', 1729, this)">🔴 關門</button>
      </div>
      <div class="status" id="status-woparker-1729"></div>
    </div>

    <!-- 民生北路 B站 -->
    <div class="card">
      <h2>📍 民生北路 B站</h2>
      <div class="btn-group">
        <button class="btn btn-open"  onclick="woparkerControl('open', 1731, this)">🟢 開門</button>
        <button class="btn btn-close" onclick="woparkerControl('close', 1731, this)">🔴 關門</button>
      </div>
      <div class="status" id="status-woparker-1731"></div>
    </div>

    <!-- 益文一街站 -->
    <div class="card">
      <h2>📍 益文一街站</h2>
      <div class="btn-group">
        <h4>出口</h4>
        <button class="btn btn-open"  onclick="woparkerControl('open', 1807, this)">🟢 開門</button>
        <button class="btn btn-close" onclick="woparkerControl('close', 1807, this)">🔴 關門</button>
      </div>
      <div class="status" id="status-woparker-1807"></div>
    </div>

  </div>

  <script>
    const TOKENS = {
      TOKEN_132: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpZCI6MTMyLCJleHAiOjIyOTY5MDUxODl9.76P3wIKx5R0X-8Lq0YrR6w-5KYdgGGkCdrDE3dTTDCo",
      TOKEN_238: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpZCI6MjM4LCJleHAiOjIyOTY5MDY3ODF9.Z9D7orkZx7ms6ViFaq_bHpM9yKWSJxm8waTrHktv-DQ",
      TOKEN_260: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpZCI6MjYwLCJleHAiOjIyOTY5MDY5OTV9.r8oue0WjLjqOgcET2J9lOyVgMt6uJgZTeGzB84VPMsI",
    };

    const WORKER_URL = "https://parking-opener.abc920426920426.workers.dev";

    // ===== 舊系統控制 (透過 Worker 代理) =====
    async function controlGate(action, devId, tokenKey, btnEl) {
      const statusEl = document.getElementById(`status-${devId}`);
      const allBtns = btnEl.closest('.btn-group').querySelectorAll('.btn');

      allBtns.forEach(b => b.disabled = true);
      statusEl.className = 'status loading';
      statusEl.textContent = action === 'open' ? '⏳ 開門中...' : '⏳ 關門中...';

      try {
        const res = await fetch(`${WORKER_URL}/api/paku/gate?action=${action}&dev_id=${devId}&token=${encodeURIComponent(TOKENS[tokenKey])}`, {
          method: 'GET'
        });

        const data = await res.json();

        if (res.ok) {
          statusEl.className = 'status success';
          statusEl.textContent = action === 'open' ? '✅ 開門成功！' : '✅ 關門成功！';
        } else {
          throw new Error(data.error || `HTTP ${res.status}`);
        }
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.textContent = `❌ 失敗：${err.message}`;
      } finally {
        setTimeout(() => {
          allBtns.forEach(b => b.disabled = false);
        }, 2000);
      }
    }

    // ===== woparker 新系統控制 (透過 Worker 代理) =====
    async function woparkerControl(action, id, btnEl) {
      const statusEl = document.getElementById(`status-woparker-${id}`);
      const allBtns = btnEl.closest('.btn-group').querySelectorAll('.btn');

      allBtns.forEach(b => b.disabled = true);
      statusEl.className = 'status loading';
      statusEl.textContent = action === 'open' ? '⏳ 開門中...' : '⏳ 關門中...';

      try {
        const res = await fetch(`${WORKER_URL}/api/woparker/${action}?id=${id}`, {
          method: 'GET'
        });

        const data = await res.json();
        console.log(`[woparker id=${id}] 回應:`, data);

        if (res.ok) {
          statusEl.className = 'status success';
          statusEl.textContent = action === 'open' ? '✅ 開門成功！' : '✅ 關門成功！';
        } else {
          throw new Error(JSON.stringify(data));
        }
      } catch (err) {
        console.error(`[woparker id=${id}] 錯誤:`, err);
        statusEl.className = 'status error';
        statusEl.textContent = `❌ 失敗：${err.message.substring(0, 40)}`;
      } finally {
        setTimeout(() => {
          allBtns.forEach(b => b.disabled = false);
        }, 2000);
      }
    }

    // ===== 動態產生 apple-touch-icon =====
    const canvas = document.createElement('canvas');
    canvas.width = 180;
    canvas.height = 180;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#0066cc';
    ctx.beginPath();
    ctx.roundRect(0, 0, 180, 180, 30);
    ctx.fill();

    ctx.fillStyle = 'white';
    ctx.font = 'bold 120px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('P', 90, 95);

    const link = document.createElement('link');
    link.rel = 'apple-touch-icon';
    link.href = canvas.toDataURL('image/png');
    document.head.appendChild(link);

  </script>

</body>
</html>
